<!DOCTYPE html>
<html>

<header>
  <meta charset="UTF-8">
  <meta name="viewport" scontent="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="./style1.css">
  <title>DC-DC simlation</title>
  <h2 class="heading-6">DC-DC simlator on Wasm+Rust</h2><br>

</header>

<body>
<div class="main">
  <div class="contentA">

      <table class="table1">
        <tr>
          <th scope="col">Series</th>
          <th scope="col">
            <select name="series" size="1">
              <option>S-19912/3</option>
              <option>S-19914/5</option>
              <option>S-19917/07</option>
              </select>
          </th>
        </tr>

        <tr>
          <th colspan="2">Condition</th>
        </tr>

        <tr>
          <th>VIN[V]</th>
          <label for="vin"></label>
          <td><input type="number" id="vin" value="12"></td>
        </tr>

        <tr>
          <th>VOUT[V]</th>
          <label for="vout"></label>
          <td><input type="number" id="vout" value="5"></td>
        </tr>

        <tr>
          <th>IOUT[A]</th>
          <td><input type="number" id="iout" value="1"></td>
        </tr>
       
        <tr>
          <th>fsw[kHz]</th>
          <td><input type="number" id="fsw" value="400"></td>
        </tr>

        <tr>
          <th colspan="2">External Compornents</th>
        </tr>

        <tr>
          <th>L[uH]</th>
          <td><input type="number" id="ind" value="6.8"></td>
        </tr>
       
        <tr>
          <th>Cout[uF]</th>
          <td><input type="number" id="cout" value="10"></td>
        </tr>

      </table>
</div>


<div class="right">
  <div class="contentB">
    <form id="inputForm">
        <label for="slope">傾き (a):</label>
        <input type="number" id="slope" value="1" step="0.1">
        <label for="intercept">切片 (b):</label>
        <input type="number" id="intercept" value="0" step="0.1">
        <button type="submit">描画</button>
    </form>
    <canvas id="myCanvas" width="400" height="200" style="border:1px solid #000;"></canvas>
  </div>

  <div class="contentC">
      <th>Duty[%]</th>
      <label for="duty"></label>
      <td><input type="number" id="duty" readonly></td>
    </tr>
  </div>
</div>

<script type="module">
    import init, { linear_function } from './pkg/wasm_dcdc.js';

    async function main() {
        await init(); // Rust-WASMモジュールの初期化

        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        const form = document.getElementById("inputForm");

        // 描画関数
        function drawLine(a, b) {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Canvasをクリア
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - linear_function(a, b, 0)); // Y軸を反転
            ctx.lineTo(canvas.width, canvas.height - linear_function(a, b, canvas.width));
            ctx.strokeStyle = "blue";
            ctx.stroke();
        }

        // フォーム送信時の処理
        form.addEventListener("submit", (event) => {
            event.preventDefault(); // ページリロードを防止

            const a = parseFloat(document.getElementById("slope").value); // 傾き
            const b = parseFloat(document.getElementById("intercept").value); // 切片

            drawLine(a, b); // 入力値で描画
        });

        // 初期描画
        drawLine(1, 0);
    }

    main();
</script>



  </div>
</div>


<script type="module">
    import init, { duty_function } from './pkg/wasm_dcdc.js';

  async function main() {
      await init(); // Rust-WASMモジュールの初期化

      const vin = document.getElementById("vin");
      const vout = document.getElementById("vout");
      const duty = document.getElementById("duty");

      const duty_cal = () => {
                const vin1 = parseFloat(vin.value) || 0; // Aの値
                const vout1 = parseFloat(vout.value) || 0; // Bの値
                const duty1 = duty_function(vin1, vout1); // Rustで計算
                //console.log(duty1);
                const rDuty = Math.round(duty1 * 100) / 100; //丸め込み
                duty.value = rDuty; // Xに結果を表示
            };
          

          // イベントリスナーを登録
          vin.addEventListener("input", duty_cal);
          vout.addEventListener("input", duty_cal);
        }
main();
</script>

<footer>
  <div id="footer"></div>
  <center>rev0.0.1</center>
</footer>

</body>
</html>
